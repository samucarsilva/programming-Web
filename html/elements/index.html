<!DOCTYPE html>
<html lang="pt-BR">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Os Elementos HTML
    </title>
</head>
<body>

    <!-- Headings  -->

    <div>
        <h1>
            Título
        </h1>

        <h2>
            Título
        </h2>

        <h3>
            Título
        </h3>

        <h4>
            Título
        </h4>

        <h5>
            Título
        </h5>

        <h6>
            Título
        </h6>
    </div>

    <!-- Parágrafo -->
    
    <div>
        <p>
            Parágrafo
        </p>

        <p>
            Parágrafo
        </p>

        <p>
            Parágrafo
        </p>
    </div>

    <!-- Listas -->

    <div>
        <ol>
            <li>
                Item
            </li>

            <li>
                Item
            </li>

            <li>
                Item
            </li>
        </ol>

        <ul>
            <li>
                Item
            </li>

            <li>
                Item
            </li>

            <li>
                Item
            </li>
        </ul>
    </div>

    <!-- Hiperlinks -->

    <div>
        <a href="https://developer.mozilla.org/en-US/docs/Web">
            Web Docs
        </a>
    </div>

    <!-- Multimídia -->

    <div>
        <img src="images/html-logo.svg" alt="Logotipo HTML">
    </div>

    <!-- Tabelas -->

    <div>
        <table>
            <thead>
                <tr>
                    <th scope="col">
                        Título
                    </th>

                    <th scope="col">
                        Título
                    </th>

                    <th scope="col">
                        Título
                    </th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>
                        Célula
                    </td>

                    <td>
                        Célula
                    </td>

                    <td>
                        Célula
                    </td>
                </tr>

                <tr>
                    <td>
                        Célula
                    </td>

                    <td>
                        Célula
                    </td>

                    <td>
                        Célula
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
